<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="./favicon.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superstar Messages</title><link rel="stylesheet" href="./school-shell.css">
  <style>
    :root{--bg:#070a14;--panel:rgba(255,255,255,.075);--border:rgba(255,255,255,.16);--text:#fff;--muted:#aeb9d2;--accent:#ffb74d;--accentText:#261600;--green:#79e8ad;--red:#ff8e8e;--blue:#91aaff}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;color:var(--text);background:radial-gradient(circle at 75% -10%,#263b73,transparent 38rem),var(--bg);font-family:Inter,Arial,Helvetica,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}a{color:inherit}.hidden{display:none!important}main{width:min(1240px,100%);margin:0 auto;padding:52px 24px 90px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:24px}.eyebrow{display:inline-flex;margin-bottom:14px;padding:8px 13px;border:1px solid rgba(145,170,255,.3);border-radius:999px;color:#c6d1ff;background:rgba(145,170,255,.10);font-weight:850}h1{font-size:clamp(3rem,8vw,6rem);line-height:.95;letter-spacing:-4px;margin-bottom:10px}.lead{max-width:760px;color:var(--muted);line-height:1.65}.button{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:11px 17px;border:0;border-radius:12px;font-weight:850;text-decoration:none}.secondary{color:var(--text);border:1px solid var(--border);background:var(--panel)}.accent{color:var(--accentText);background:var(--accent)}.danger{color:var(--red);border:1px solid rgba(255,142,142,.36);background:rgba(255,142,142,.09)}.grid{display:grid;grid-template-columns:minmax(320px,.75fr) minmax(0,1.25fr);gap:18px;align-items:start}.panel{padding:22px;border:1px solid var(--border);border-radius:18px;background:rgba(17,24,44,.94);box-shadow:0 22px 70px rgba(0,0,0,.22)}.field{display:grid;gap:7px;margin-bottom:13px}label{font-weight:850;color:#e8edff}input,select,textarea{width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:12px;color:var(--text);background:rgba(255,255,255,.075);outline:0}select option{color:#111}textarea{min-height:120px;resize:vertical}.muted{color:var(--muted);line-height:1.55}.message{margin-top:12px;color:var(--red);font-weight:850}.ok{color:var(--green)}.cards{display:grid;gap:12px}.card{padding:16px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.055)}.card h3{margin-bottom:6px}.meta{color:var(--muted);font-size:.9rem;line-height:1.5}.body{margin-top:12px;white-space:pre-wrap;line-height:1.6}.pill{display:inline-flex;border-radius:999px;padding:6px 10px;font-weight:900;background:rgba(145,170,255,.14);color:var(--blue);font-size:.84rem}.empty{padding:18px;border:1px dashed rgba(255,255,255,.16);border-radius:14px;color:var(--muted);text-align:center;background:rgba(255,255,255,.035)}.loading{display:grid;min-height:100vh;place-items:center;padding:24px;text-align:center}@media(max-width:900px){main{padding:84px 14px 70px}.top{flex-direction:column}.grid{grid-template-columns:1fr}h1{letter-spacing:-2px}}
  </style>
</head>
<body>
<section id="loading" class="loading"><div class="panel"><h2>Loading messages…</h2><p class="muted">Checking your account.</p></div></section>
<main id="app" class="hidden"><div class="top"><div><div class="eyebrow">💬 Message center</div><h1>Messages</h1><p class="lead">Admins can send private messages to one student, a class, or everyone. Students see only messages sent to them.</p></div><div><a class="button secondary" href="./dashboard.html">🏫 Dashboard</a> <button class="button secondary" id="refreshBtn">↻ Refresh</button></div></div>
<div class="grid"><section class="panel hidden" id="adminPanel"><h2>Send message</h2><form id="messageForm"><div class="field"><label for="targetMode">Send to</label><select id="targetMode"><option value="everyone">Everyone</option><option value="class">A class</option><option value="student">One student</option></select></div><div class="field hidden" id="classField"><label for="classSelect">Class</label><select id="classSelect"></select></div><div class="field hidden" id="studentField"><label for="studentSelect">Student</label><select id="studentSelect"></select></div><div class="field"><label for="titleInput">Title</label><input id="titleInput" maxlength="120" required placeholder="Example: Reminder"></div><div class="field"><label for="bodyInput">Message</label><textarea id="bodyInput" maxlength="3000" required placeholder="Write the message here…"></textarea></div><button class="button accent" type="submit">Send message</button><div id="formMessage" class="message"></div></form></section><section class="panel"><h2 id="listTitle">Inbox</h2><p class="muted" id="listLead">Newest messages first.</p><div id="messageList" class="cards"></div></section></div></main>
<script type="module">
import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";import { getFirestore,collection,getDocs,getDoc,doc,addDoc,serverTimestamp,query,where } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyDHc7HwBlR6N_GBkpbmMudhN_RZ9P7yqFk",authDomain:"donut-grade-portal.firebaseapp.com",projectId:"donut-grade-portal",storageBucket:"donut-grade-portal.firebasestorage.app",messagingSenderId:"154823535840",appId:"1:154823535840:web:b25deb1c1f3cb9405cb485"};const app=getApps().length?getApp():initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);const $=id=>document.getElementById(id);let me=null,data={classes:[],students:[],messages:[]};
function staff(r){return ['admin','co-owner','owner'].includes(r)}function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function snap(s){return s.docs.map(d=>({id:d.id,...d.data()}))}function nameOf(s){return s.name||s.username||'Student'}function ts(v){if(!v)return 0;if(typeof v.toMillis==='function')return v.toMillis();if(typeof v.seconds==='number')return v.seconds*1000;return 0}function fmt(v){const m=ts(v);return m?new Date(m).toLocaleString():''}function targetText(m){if(m.isEveryone)return 'Everyone'; if((m.classNames||[]).length)return 'Class: '+m.classNames.join(', '); if((m.studentNames||[]).length)return 'Student: '+m.studentNames.join(', '); return `${(m.recipientIds||[]).length} recipients`;}
function fail(error){console.error(error);const code=error?.code||'error';const msg=error?.message||String(error||'Unknown error');$('loading').innerHTML=`<div class="panel"><h2>Could not load messages</h2><p class="muted">Most likely Firebase rules are not updated yet. Copy FIRESTORE-RULES.txt into Firebase Rules and press Publish.</p><p class="message">${esc(code)} · ${esc(msg)}</p><p style="margin-top:14px"><a class="button secondary" href="./dashboard.html">🏫 Dashboard</a> <button class="button secondary" onclick="location.reload()">↻ Retry</button></p></div>`;}
async function load(){
  if(staff(me.role)){
    const [classes,users,msgs]=await Promise.all([getDocs(collection(db,'classes')),getDocs(collection(db,'users')),getDocs(collection(db,'messages'))]);
    data.classes=snap(classes).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    data.students=snap(users).filter(u=>u.role==='student').sort((a,b)=>nameOf(a).localeCompare(nameOf(b)));
    data.messages=snap(msgs).sort((a,b)=>ts(b.createdAt)-ts(a.createdAt));
  }else{
    const mineQ=query(collection(db,'messages'),where('recipientIds','array-contains',me.id));
    const allQ=query(collection(db,'messages'),where('isEveryone','==',true));
    const [mineSnap,allSnap]=await Promise.all([getDocs(mineQ),getDocs(allQ)]);
    const merged=new Map();
    [...snap(mineSnap),...snap(allSnap)].forEach(m=>merged.set(m.id,m));
    data.messages=[...merged.values()].sort((a,b)=>ts(b.createdAt)-ts(a.createdAt));
  }
  render();
}
function render(){if(staff(me.role)){ $('adminPanel').classList.remove('hidden'); $('classSelect').innerHTML=data.classes.map(c=>`<option value="${esc(c.id)}">${esc(c.name||'Class')}</option>`).join(''); $('studentSelect').innerHTML=data.students.map(s=>`<option value="${esc(s.id)}">${esc(nameOf(s))}</option>`).join(''); } $('listTitle').textContent=staff(me.role)?'All messages':'My messages'; $('messageList').innerHTML=data.messages.length?data.messages.map(m=>`<article class="card"><div><span class="pill">${esc(targetText(m))}</span></div><h3>${esc(m.title||'Untitled message')}</h3><div class="meta">Sent by ${esc(m.senderName||'Staff')} · ${esc(fmt(m.createdAt))}</div><div class="body">${esc(m.body||'')}</div></article>`).join(''):'<div class="empty">No messages yet.</div>';}
function updateMode(){const mode=$('targetMode').value;$('classField').classList.toggle('hidden',mode!=='class');$('studentField').classList.toggle('hidden',mode!=='student');}
$('messageForm').addEventListener('submit',async e=>{e.preventDefault();const mode=$('targetMode').value;const title=$('titleInput').value.trim();const body=$('bodyInput').value.trim();let recipientIds=[],classIds=[],classNames=[],studentIds=[],studentNames=[],isEveryone=false;if(mode==='everyone'){isEveryone=true;recipientIds=data.students.map(s=>s.id)}else if(mode==='class'){const cid=$('classSelect').value;classIds=[cid];classNames=[data.classes.find(c=>c.id===cid)?.name||'Class'];recipientIds=data.students.filter(s=>s.classId===cid).map(s=>s.id)}else{const sid=$('studentSelect').value;studentIds=[sid];studentNames=[nameOf(data.students.find(s=>s.id===sid)||{})];recipientIds=[sid]}if(!title||!body){$('formMessage').textContent='Enter a title and message.';return;}if(!recipientIds.length){$('formMessage').textContent='No students match this target.';return;}$('formMessage').textContent='Sending…';await addDoc(collection(db,'messages'),{title,body,isEveryone,classIds,classNames,studentIds,studentNames,recipientIds,senderId:auth.currentUser.uid,senderName:me.name||me.username||'Staff',senderRole:me.role||'admin',createdAt:serverTimestamp()});$('messageForm').reset();updateMode();$('formMessage').className='message ok';$('formMessage').textContent='Message sent.';await load();});
$('targetMode').addEventListener('change',updateMode);$('refreshBtn').addEventListener('click',()=>location.reload());onAuthStateChanged(auth,async user=>{try{if(!user){location.replace('./index.html');return;}const p=await getDoc(doc(db,'users',user.uid));if(!p.exists()){location.replace('./index.html');return;}me={id:user.uid,...p.data()};await load();$('loading').classList.add('hidden');$('app').classList.remove('hidden');}catch(error){fail(error);}});
</script><script type="module" src="./school-shell.js"></script>
</body></html>

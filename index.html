<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Donut website"
    >

    <title>Donut</title>

    <style>
        :root {
            --background: #090d1a;
            --background-light: #263b73;
            --text: #ffffff;
            --muted: #b8c1d9;
            --surface: rgba(255, 255, 255, 0.08);
            --surface-hover: rgba(255, 255, 255, 0.14);
            --border: rgba(255, 255, 255, 0.22);
            --success: #8fffc2;
            --danger: #ff9292;
            --admin: #ffb74d;
            --admin-dark: #1c1204;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family:
                Inter,
                Arial,
                Helvetica,
                sans-serif;
            color: var(--text);
            background:
                radial-gradient(
                    circle at top,
                    var(--background-light),
                    transparent 45%
                ),
                var(--background);
        }

        body.modal-open {
            overflow: hidden;
        }

        button,
        input {
            font: inherit;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(1100px, 100%);
            margin: 0 auto;
            padding: 24px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-link {
            padding: 10px 12px;
            border-radius: 8px;
            color: #dbe4ff;
            text-decoration: none;
            transition:
                color 0.2s ease,
                background 0.2s ease;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--surface);
        }

        .admin-button,
        .button,
        .normal-button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 12px 18px;
            border: 0;
            border-radius: 10px;
            font-weight: 750;
            cursor: pointer;
            text-decoration: none;
            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease,
                background 0.2s ease;
        }

        .admin-button:hover,
        .button:hover,
        .normal-button:hover {
            transform: translateY(-2px);
        }

        .admin-button {
            color: var(--admin-dark);
            background: var(--admin);
        }

        .admin-button:hover {
            box-shadow:
                0 8px 25px rgba(255, 183, 77, 0.3);
        }

        main {
            display: grid;
            place-items: center;
            min-height: calc(100vh - 95px);
            padding: 45px 24px;
            text-align: center;
        }

        .hero {
            width: min(760px, 100%);
        }

        .badge {
            display: inline-block;
            margin-bottom: 22px;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: #b9c8ff;
            background: var(--surface);
            backdrop-filter: blur(8px);
        }

        h1 {
            margin-bottom: 20px;
            font-size: clamp(3.5rem, 11vw, 7rem);
            line-height: 0.95;
            letter-spacing: -4px;
        }

        .description {
            max-width: 620px;
            margin: 0 auto;
            color: var(--muted);
            font-size: 1.15rem;
            line-height: 1.75;
        }

        .buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 34px;
        }

        .primary {
            color: #081023;
            background: #ffffff;
        }

        .secondary {
            color: #ffffff;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .secondary:hover {
            background: var(--surface-hover);
        }

        #message {
            min-height: 26px;
            margin-top: 24px;
            color: var(--success);
            font-weight: 700;
        }

        .admin-panel {
            display: none;
            width: min(560px, 100%);
            margin: 30px auto 0;
            padding: 24px;
            border: 1px solid rgba(255, 183, 77, 0.5);
            border-radius: 16px;
            background: rgba(255, 183, 77, 0.09);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .admin-panel.visible {
            display: block;
            animation: appear 0.25s ease;
        }

        .admin-icon {
            display: grid;
            place-items: center;
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            border-radius: 50%;
            color: var(--admin-dark);
            background: var(--admin);
            font-size: 1.8rem;
        }

        .admin-panel h2 {
            margin-bottom: 10px;
            color: var(--admin);
        }

        .admin-panel p {
            color: var(--muted);
            line-height: 1.6;
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(8px);
        }

        .modal.visible {
            display: flex;
        }

        .modal-card {
            position: relative;
            width: min(420px, 100%);
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: #11172a;
            box-shadow:
                0 30px 100px rgba(0, 0, 0, 0.5);
            animation: appear 0.22s ease;
        }

        .modal-card h2 {
            margin-bottom: 10px;
        }

        .modal-description {
            margin-bottom: 22px;
            color: var(--muted);
            line-height: 1.55;
        }

        .close-button {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 38px;
            height: 38px;
            border: 0;
            border-radius: 9px;
            color: var(--text);
            background: var(--surface);
            cursor: pointer;
        }

        .close-button:hover {
            background: var(--surface-hover);
        }

        .password-label {
            display: block;
            margin-bottom: 8px;
            color: #dbe4ff;
            font-weight: 700;
        }

        .password-input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
        }

        .password-input:focus {
            border-color: var(--admin);
            box-shadow:
                0 0 0 3px rgba(255, 183, 77, 0.15);
        }

        .password-wrapper {
            position: relative;
        }

        .show-password {
            position: absolute;
            top: 50%;
            right: 10px;
            padding: 7px 9px;
            border: 0;
            border-radius: 7px;
            color: var(--muted);
            background: transparent;
            cursor: pointer;
            transform: translateY(-50%);
        }

        .show-password:hover {
            color: var(--text);
            background: var(--surface);
        }

        .login-button {
            width: 100%;
            margin-top: 16px;
            color: var(--admin-dark);
            background: var(--admin);
        }

        .login-error {
            min-height: 24px;
            margin-top: 14px;
            color: var(--danger);
            font-weight: 700;
        }

        footer {
            padding: 25px;
            color: #7f89a3;
            text-align: center;
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 650px) {
            nav {
                padding: 18px;
            }

            .nav-link {
                display: none;
            }

            h1 {
                letter-spacing: -2px;
            }

            .admin-button {
                padding: 10px 13px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">Donut</div>

        <div class="nav-links">
            <a class="nav-link" href="#home">
                Home
            </a>

            <a class="nav-link" href="#about">
                About
            </a>

            <button
                class="admin-button"
                id="adminButton"
                type="button"
            >
                🔐 Admin
            </button>
        </div>
    </nav>

    <main id="home">
        <section class="hero">
            <div class="badge">
                Website under development
            </div>

            <h1>Donut.</h1>

            <p class="description" id="about">
                Welcome to Donut. More content and features
                will be added soon.
            </p>

            <div class="buttons">
                <button
                    class="normal-button primary"
                    id="testButton"
                    type="button"
                >
                    Test Website
                </button>

                <a
                    class="button secondary"
                    href="https://github.com/TakkyTiggerTTT/Donut"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    View Repository
                </a>
            </div>

            <div id="message" aria-live="polite"></div>

            <section
                class="admin-panel"
                id="adminPanel"
            >
                <div class="admin-icon">
                    ✓
                </div>

                <h2>You are an admin</h2>

                <p>
                    You successfully entered the admin password.
                </p>

                <div class="buttons">
                    <a
                        class="button admin-button"
                        href="https://github.com/TakkyTiggerTTT/Donut/edit/main/index.html"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        Open Website Editor
                    </a>

                    <button
                        class="normal-button secondary"
                        id="logoutButton"
                        type="button"
                    >
                        Log Out
                    </button>
                </div>
            </section>
        </section>
    </main>

    <footer>
        <span id="year"></span> Donut
    </footer>

    <div
        class="modal"
        id="passwordModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="loginTitle"
    >
        <div class="modal-card">
            <button
                class="close-button"
                id="closeModalButton"
                type="button"
                aria-label="Close admin login"
            >
                ✕
            </button>

            <h2 id="loginTitle">
                Admin Login
            </h2>

            <p class="modal-description">
                Enter the admin password to continue.
            </p>

            <form id="passwordForm">
                <label
                    class="password-label"
                    for="passwordInput"
                >
                    Password
                </label>

                <div class="password-wrapper">
                    <input
                        class="password-input"
                        id="passwordInput"
                        type="password"
                        autocomplete="current-password"
                        required
                    >

                    <button
                        class="show-password"
                        id="showPasswordButton"
                        type="button"
                    >
                        Show
                    </button>
                </div>

                <button
                    class="normal-button login-button"
                    type="submit"
                >
                    Sign In
                </button>

                <div
                    class="login-error"
                    id="loginError"
                    aria-live="polite"
                ></div>
            </form>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "CHANGE_THIS_PASSWORD";

        const adminButton =
            document.getElementById("adminButton");

        const passwordModal =
            document.getElementById("passwordModal");

        const passwordForm =
            document.getElementById("passwordForm");

        const passwordInput =
            document.getElementById("passwordInput");

        const loginError =
            document.getElementById("loginError");

        const closeModalButton =
            document.getElementById("closeModalButton");

        const showPasswordButton =
            document.getElementById("showPasswordButton");

        const adminPanel =
            document.getElementById("adminPanel");

        const logoutButton =
            document.getElementById("logoutButton");

        const testButton =
            document.getElementById("testButton");

        const message =
            document.getElementById("message");

        const year =
            document.getElementById("year");

        year.textContent =
            `© ${new Date().getFullYear()}`;

        function isAdminLoggedIn() {
            return sessionStorage.getItem(
                "donutAdminLoggedIn"
            ) === "true";
        }

        function showAdminPanel() {
            adminPanel.classList.add("visible");
            adminButton.textContent = "✓ Admin";
            message.textContent = "";
        }

        function hideAdminPanel() {
            adminPanel.classList.remove("visible");
            adminButton.textContent = "🔐 Admin";
        }

        function openPasswordModal() {
            loginError.textContent = "";
            passwordInput.value = "";

            passwordModal.classList.add("visible");
            document.body.classList.add("modal-open");

            setTimeout(() => {
                passwordInput.focus();
            }, 50);
        }

        function closePasswordModal() {
            passwordModal.classList.remove("visible");
            document.body.classList.remove("modal-open");

            passwordInput.value = "";
            loginError.textContent = "";
        }

        adminButton.addEventListener("click", () => {
            if (isAdminLoggedIn()) {
                showAdminPanel();

                adminPanel.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });

                return;
            }

            openPasswordModal();
        });

        closeModalButton.addEventListener(
            "click",
            closePasswordModal
        );

        passwordModal.addEventListener(
            "click",
            (event) => {
                if (event.target === passwordModal) {
                    closePasswordModal();
                }
            }
        );

        document.addEventListener("keydown", (event) => {
            if (
                event.key === "Escape" &&
                passwordModal.classList.contains("visible")
            ) {
                closePasswordModal();
            }
        });

        passwordForm.addEventListener(
            "submit",
            (event) => {
                event.preventDefault();

                if (
                    passwordInput.value ===
                    ADMIN_PASSWORD
                ) {
                    sessionStorage.setItem(
                        "donutAdminLoggedIn",
                        "true"
                    );

                    closePasswordModal();
                    showAdminPanel();

                    adminPanel.scrollIntoView({
                        behavior: "smooth",
                        block: "center"
                    });
                } else {
                    loginError.textContent =
                        "Incorrect password.";

                    passwordInput.select();
                }
            }
        );

        showPasswordButton.addEventListener(
            "click",
            () => {
                const passwordIsHidden =
                    passwordInput.type === "password";

                passwordInput.type =
                    passwordIsHidden
                        ? "text"
                        : "password";

                showPasswordButton.textContent =
                    passwordIsHidden
                        ? "Hide"
                        : "Show";
            }
        );

        logoutButton.addEventListener("click", () => {
            sessionStorage.removeItem(
                "donutAdminLoggedIn"
            );

            hideAdminPanel();

            message.textContent =
                "You have logged out.";
        });

        testButton.addEventListener("click", () => {
            message.textContent =
                "Donut is working correctly!";
        });

        if (isAdminLoggedIn()) {
            showAdminPanel();
        }
    </script>
</body>
</html>

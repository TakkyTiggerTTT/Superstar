<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Donut website"
    >

    <title>Donut</title>

    <style>
        :root {
            --background: #090d1a;
            --background-light: #263b73;
            --text: #ffffff;
            --muted-text: #b8c1d9;
            --border: rgba(255, 255, 255, 0.22);
            --surface: rgba(255, 255, 255, 0.07);
            --success: #8fffc2;
            --admin: #ffb74d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family:
                Inter,
                Arial,
                Helvetica,
                sans-serif;
            color: var(--text);
            background:
                radial-gradient(
                    circle at top,
                    var(--background-light),
                    transparent 45%
                ),
                var(--background);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(1100px, 100%);
            margin: 0 auto;
            padding: 24px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-link {
            padding: 9px 12px;
            color: #dbe4ff;
            text-decoration: none;
            border-radius: 8px;
            transition:
                color 0.2s ease,
                background 0.2s ease;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--surface);
        }

        .admin-button {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 16px;
            border: 1px solid rgba(255, 183, 77, 0.55);
            border-radius: 9px;
            color: #1c1204;
            background: var(--admin);
            font-weight: 800;
            text-decoration: none;
            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease;
        }

        .admin-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 183, 77, 0.25);
        }

        main {
            display: grid;
            place-items: center;
            min-height: calc(100vh - 95px);
            padding: 45px 24px;
            text-align: center;
        }

        .hero {
            width: min(760px, 100%);
        }

        .badge {
            display: inline-block;
            margin-bottom: 22px;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: #b9c8ff;
            background: var(--surface);
            backdrop-filter: blur(8px);
        }

        h1 {
            margin-bottom: 20px;
            font-size: clamp(3.5rem, 11vw, 7rem);
            line-height: 0.95;
            letter-spacing: -4px;
        }

        .description {
            max-width: 620px;
            margin: 0 auto;
            color: var(--muted-text);
            font-size: 1.15rem;
            line-height: 1.75;
        }

        .buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 34px;
        }

        button,
        .button {
            display: inline-block;
            padding: 14px 24px;
            border: 0;
            border-radius: 10px;
            font: inherit;
            font-weight: 750;
            cursor: pointer;
            text-decoration: none;
            transition:
                transform 0.2s ease,
                background 0.2s ease;
        }

        button:hover,
        .button:hover {
            transform: translateY(-2px);
        }

        .primary {
            color: #081023;
            background: #ffffff;
        }

        .secondary {
            color: #ffffff;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .secondary:hover {
            background: rgba(255, 255, 255, 0.13);
        }

        #message {
            min-height: 26px;
            margin-top: 25px;
            color: var(--success);
            font-weight: 700;
        }

        footer {
            padding: 25px;
            color: #7f89a3;
            text-align: center;
        }

        @media (max-width: 650px) {
            nav {
                padding: 18px;
            }

            .nav-link {
                display: none;
            }

            .admin-button {
                padding: 9px 13px;
            }

            h1 {
                letter-spacing: -2px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">Donut</div>

        <div class="nav-links">
            <a class="nav-link" href="#home">
                Home
            </a>

            <a class="nav-link" href="#about">
                About
            </a>

            <a
                class="admin-button"
                href="https://github.com/TakkyTiggerTTT/Donut/edit/main/index.html"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Open the GitHub website editor"
            >
                ⚙ Admin
            </a>
        </div>
    </nav>

    <main id="home">
        <section class="hero">
            <div class="badge">
                Website under development
            </div>

            <h1>Donut.</h1>

            <p class="description" id="about">
                Welcome to Donut. This website is currently being
                developed, and more content and features will be
                added soon.
            </p>

            <div class="buttons">
                <button class="primary" id="helloButton">
                    Test Website
                </button>

                <a
                    class="button secondary"
                    href="https://github.com/TakkyTiggerTTT/Donut"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    View Repository
                </a>
            </div>

            <div id="message" aria-live="polite"></div>
        </section>
    </main>

    <footer>
        <span id="year"></span> Donut
    </footer>

    <script>
        const helloButton = document.getElementById("helloButton");
        const message = document.getElementById("message");
        const year = document.getElementById("year");

        year.textContent = `© ${new Date().getFullYear()}`;

        helloButton.addEventListener("click", () => {
            message.textContent = "Donut is working correctly!";
        });
    </script>
</body>
</html>
